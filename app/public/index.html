<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StartupHub Task Manager</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>🚀 StartupHub Task Manager</h1>
      <p class="subtitle">Powered by Node.js, Express & PostgreSQL on AWS</p>
      <div class="user-info" id="userInfo" style="display: none;">
        <span>👤 <strong id="currentUser"></strong></span>
        <span class="role-badge" id="userRole"></span>
        <button onclick="logout()" class="btn btn-secondary">Logout</button>
      </div>
    </header>

    <!-- Stats Dashboard -->
    <div class="stats-dashboard" id="statsDashboard" style="display: none;">
      <div class="stat-card">
        <div class="stat-number" id="totalTasks">0</div>
        <div class="stat-label">Total Tasks</div>
      </div>
      <div class="stat-card todo">
        <div class="stat-number" id="todoCount">0</div>
        <div class="stat-label">To Do</div>
      </div>
      <div class="stat-card in-progress">
        <div class="stat-number" id="inProgressCount">0</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card done">
        <div class="stat-number" id="doneCount">0</div>
        <div class="stat-label">Done</div>
      </div>
      <div class="stat-card overdue">
        <div class="stat-number" id="overdueCount">0</div>
        <div class="stat-label">Overdue</div>
      </div>
    </div>

    <!-- User Performance (Admin Only) -->
    <div class="card" id="userPerformance" style="display: none;">
      <h2 class="card-title">Team Performance</h2>
      <div id="userPerformanceList"></div>
    </div>

    <!-- Create Task Form (Admin Only) -->
    <div class="card" id="createForm" style="display: none;">
      <h2 class="card-title">Create New Task</h2>
      <form id="taskForm">
        <div class="form-row">
          <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" class="form-input" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-input" rows="3"></textarea>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" class="form-input">
              <option value="todo">To Do</option>
              <option value="in_progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>

          <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority" name="priority" class="form-input">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </div>

          <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" class="form-input" placeholder="e.g., Development, Design">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="due_date">Due Date</label>
            <input type="date" id="due_date" name="due_date" class="form-input">
          </div>

          <div class="form-group" id="assignGroup" style="display: none;">
            <label for="owner_id">Assigned To</label>
            <select id="owner_id" name="owner_id" class="form-input">
              <option value="">Unassigned</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Create Task</button>
          <button type="button" class="btn btn-secondary" onclick="resetForm()">Reset</button>
        </div>
      </form>
    </div>

    <!-- Tasks List -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Tasks</h2>
        <div class="filters" id="filtersContainer">
          <select id="filterStatus" class="form-input" onchange="loadTasks()">
            <option value="">All Status</option>
            <option value="todo">To Do</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
          <select id="filterPriority" class="form-input" onchange="loadTasks()">
            <option value="">All Priorities</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="critical">Critical</option>
          </select>
          <select id="filterOwner" class="form-input" onchange="loadTasks()" style="display: none;">
            <option value="">All Users</option>
          </select>
        </div>
      </div>

      <div class="task-list" id="taskList">
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <div class="empty-text">Loading tasks...</div>
        </div>
      </div>
    </div>

    <!-- User Management (Admin Only) -->
    <div class="card" id="userManagement" style="display: none;">
      <h2 class="card-title">User Management</h2>
      <button onclick="showCreateUserForm()" class="btn btn-primary">Create New User</button>
      
      <div id="createUserForm" style="display: none; margin-top: 20px;">
        <form id="userForm">
          <div class="form-row">
            <div class="form-group">
              <label for="newUsername">Username *</label>
              <input type="text" id="newUsername" name="username" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="newPassword">Password *</label>
              <input type="password" id="newPassword" name="password" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="newRole">Role</label>
              <select id="newRole" name="role" class="form-input">
                <option value="user">User</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create User</button>
            <button type="button" class="btn btn-secondary" onclick="hideCreateUserForm()">Cancel</button>
          </div>
        </form>
      </div>

      <div class="users-list" id="usersList"></div>
    </div>

    <footer class="footer">
      <div class="footer-info">
        <span>🖥️ Instance: <strong id="instanceId">unknown</strong></span>
        <span>⏰ Time: <strong id="currentTime"></strong></span>
      </div>
    </footer>
  </div>

  <!-- Edit Task Modal -->
  <div id="editModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Task</h2>
        <button onclick="closeEditModal()" class="modal-close">&times;</button>
      </div>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-row">
          <div class="form-group">
            <label for="editTitle">Title *</label>
            <input type="text" id="editTitle" name="title" class="form-input" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="editDescription">Description</label>
            <textarea id="editDescription" name="description" class="form-input" rows="3"></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="editStatus">Status</label>
            <select id="editStatus" name="status" class="form-input">
              <option value="todo">To Do</option>
              <option value="in_progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editPriority">Priority</label>
            <select id="editPriority" name="priority" class="form-input">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editCategory">Category</label>
            <input type="text" id="editCategory" name="category" class="form-input">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="editDueDate">Due Date</label>
            <input type="date" id="editDueDate" name="due_date" class="form-input">
          </div>
          <div class="form-group" id="editAssignGroup" style="display: none;">
            <label for="editOwnerId">Assigned To</label>
            <select id="editOwnerId" name="owner_id" class="form-input">
              <option value="">Unassigned</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Update Task</button>
          <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentUser = null;
    let users = [];
    let tasks = [];

    // Check authentication
    async function checkAuth() {
      try {
        const res = await fetch('/auth/status');
        const data = await res.json();
        
        if (!data.authenticated) {
          window.location.href = '/login.html';
          return;
        }
        
        currentUser = data.user;
        document.getElementById('currentUser').textContent = data.user.username;
        document.getElementById('userRole').textContent = data.user.role.toUpperCase();
        document.getElementById('userRole').className = `role-badge ${data.user.role}`;
        document.getElementById('userInfo').style.display = 'flex';
        
        // Show admin-only features
        if (data.user.role === 'admin') {
          document.getElementById('userManagement').style.display = 'block';
          document.getElementById('createForm').style.display = 'block';
          document.getElementById('assignGroup').style.display = 'block';
          document.getElementById('filterOwner').style.display = 'block';
        }
        
        document.getElementById('statsDashboard').style.display = 'grid';
        
        // Load data
        if (data.user.role === 'admin') {
          await loadUsers();
        }
        await loadTasks();
        await loadStats();
      } catch (err) {
        console.error('Auth check failed:', err);
        window.location.href = '/login.html';
      }
    }

    // Load users (admin only)
    async function loadUsers() {
      if (currentUser.role !== 'admin') {
        return;
      }

      try {
        const res = await fetch('/users');
        if (!res.ok) {
          console.error('Failed to load users:', res.status);
          return;
        }
        
        users = await res.json();
        
        // Populate owner dropdowns
        const ownerSelects = ['owner_id', 'editOwnerId', 'filterOwner'];
        ownerSelects.forEach(selectId => {
          const select = document.getElementById(selectId);
          if (!select) return;
          
          const currentValue = select.value;
          
          if (selectId === 'filterOwner') {
            select.innerHTML = '<option value="">All Users</option>';
          } else {
            select.innerHTML = '<option value="">Unassigned</option>';
          }
          
          users.forEach(user => {
            const option = document.createElement('option');
            option.value = user.id;
            option.textContent = user.username;
            select.appendChild(option);
          });
          
          select.value = currentValue;
        });
        
        // Load users list for admin
        loadUsersList();
      } catch (err) {
        console.error('Failed to load users:', err);
      }
    }

    // Load users list (admin only)
    function loadUsersList() {
      const usersList = document.getElementById('usersList');
      usersList.innerHTML = users.map(user => {
        const canDelete = user.id !== currentUser.id;
        return `
          <div class="user-item">
            <div class="user-info">
              <strong>${user.username}</strong>
              <span class="role-badge ${user.role}">${user.role.toUpperCase()}</span>
            </div>
            <div class="user-actions">
              <small>Created: ${new Date(user.created_at).toLocaleDateString()}</small>
              ${canDelete ? `<button onclick="deleteUser(${user.id})" class="btn btn-danger btn-sm">Delete</button>` : '<span class="current-user-badge">You</span>'}
            </div>
          </div>
        `;
      }).join('');
    }

    // Delete user (admin only)
    async function deleteUser(id) {
      if (!confirm('Are you sure you want to delete this user? This action cannot be undone.')) return;
      
      try {
        const res = await fetch(`/users/${id}`, {
          method: 'DELETE'
        });
        
        if (res.ok) {
          await loadUsers();
          await loadTasks();
          await loadStats();
          alert('User deleted successfully');
        } else {
          const error = await res.json();
          alert(error.error || 'Failed to delete user');
        }
      } catch (err) {
        console.error('Failed to delete user:', err);
        alert('Failed to delete user');
      }
    }

    // Load tasks
    async function loadTasks() {
      try {
        const res = await fetch('/api/tasks');
        tasks = await res.json();
        
        let filteredTasks = tasks;
        
        // Apply filters (admin only)
        if (currentUser.role === 'admin') {
          const statusFilter = document.getElementById('filterStatus').value;
          const priorityFilter = document.getElementById('filterPriority').value;
          const ownerFilter = document.getElementById('filterOwner').value;
          
          if (statusFilter) filteredTasks = filteredTasks.filter(t => t.status === statusFilter);
          if (priorityFilter) filteredTasks = filteredTasks.filter(t => t.priority === priorityFilter);
          if (ownerFilter) filteredTasks = filteredTasks.filter(t => t.owner_id == ownerFilter);
        }
        
        const taskList = document.getElementById('taskList');
        
        if (filteredTasks.length === 0) {
          taskList.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📝</div>
              <div class="empty-text">No tasks found</div>
            </div>
          `;
          return;
        }
        
        taskList.innerHTML = filteredTasks.map(task => {
          const isOwner = task.owner_id == currentUser.id;
          const isAdmin = currentUser.role === 'admin';
          const isOverdue = task.due_date && new Date(task.due_date) < new Date() && task.status !== 'done';
          
          return `
            <div class="task-item ${isOverdue ? 'overdue' : ''} priority-${task.priority}">
              <div class="task-header">
                <h3 class="task-title">${escapeHtml(task.title)}</h3>
                <div class="task-badges">
                  <span class="badge status-${task.status}">${formatStatus(task.status)}</span>
                  <span class="badge priority-${task.priority}">${formatPriority(task.priority)}</span>
                  ${task.category ? `<span class="badge category">${escapeHtml(task.category)}</span>` : ''}
                </div>
              </div>
              
              ${task.description ? `<p class="task-description">${escapeHtml(task.description)}</p>` : ''}
              
              <div class="task-meta">
                ${task.owner_name ? `<span>👤 Assigned to: <strong>${escapeHtml(task.owner_name)}</strong></span>` : '<span>👤 Unassigned</span>'}
                ${task.due_date ? `<span>📅 Due: ${formatDate(task.due_date)}${isOverdue ? ' <span class="overdue-label">(OVERDUE)</span>' : ''}</span>` : ''}
                <span>🕐 Created: ${formatDateTime(task.created_at)}</span>
                ${task.created_by_name ? `<span>📝 By: ${escapeHtml(task.created_by_name)}</span>` : ''}
              </div>
              
              <div class="task-actions">
                ${isAdmin ? `
                  <button onclick="editTask(${task.id})" class="btn btn-secondary">Edit</button>
                  <button onclick="deleteTask(${task.id})" class="btn btn-danger">Delete</button>
                ` : isOwner ? `
                  ${task.status === 'todo' ? `<button onclick="updateTaskStatus(${task.id}, 'in_progress')" class="btn btn-primary">Mark In Progress</button>` : ''}
                  ${task.status === 'in_progress' ? `<button onclick="updateTaskStatus(${task.id}, 'done')" class="btn btn-success">Mark Done</button>` : ''}
                  ${task.status === 'done' ? `<span class="task-completed-badge">✓ Completed</span>` : ''}
                ` : ''}
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error('Failed to load tasks:', err);
        document.getElementById('taskList').innerHTML = `
          <div class="empty-state error">
            <div class="empty-icon">❌</div>
            <div class="empty-text">Failed to load tasks</div>
          </div>
        `;
      }
    }

    // Load stats
    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const stats = await res.json();
        
        document.getElementById('totalTasks').textContent = stats.total;
        document.getElementById('todoCount').textContent = stats.todo;
        document.getElementById('inProgressCount').textContent = stats.in_progress;
        document.getElementById('doneCount').textContent = stats.done;
        document.getElementById('overdueCount').textContent = stats.overdue;
        
        // Display user performance for admins
        if (currentUser.role === 'admin' && stats.userStats && stats.userStats.length > 0) {
          document.getElementById('userPerformance').style.display = 'block';
          const performanceList = document.getElementById('userPerformanceList');
          performanceList.innerHTML = stats.userStats.map(user => `
            <div class="user-performance-item">
              <div class="user-performance-info">
                <strong>${user.username}</strong>
                <span class="user-task-count">${user.completed_tasks} / ${user.total_tasks} tasks</span>
              </div>
              <div class="progress-bar-container">
                <div class="progress-bar" style="width: ${user.completion_percentage}%">
                  <span class="progress-text">${user.completion_percentage}%</span>
                </div>
              </div>
            </div>
          `).join('');
        } else {
          document.getElementById('userPerformance').style.display = 'none';
        }
      } catch (err) {
        console.error('Failed to load stats:', err);
      }
    }

    // Create task (admin only)
    document.getElementById('taskForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (currentUser.role !== 'admin') {
        alert('Only admins can create tasks');
        return;
      }
      
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      
      try {
        const res = await fetch('/api/tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (res.ok) {
          resetForm();
          await loadTasks();
          await loadStats();
        } else {
          alert('Failed to create task');
        }
      } catch (err) {
        console.error('Failed to create task:', err);
        alert('Failed to create task');
      }
    });

    // Edit task (admin only)
    async function editTask(id) {
      if (currentUser.role !== 'admin') {
        alert('Only admins can edit tasks');
        return;
      }
      
      try {
        const res = await fetch(`/api/tasks/${id}`);
        if (!res.ok) {
          alert('Failed to load task');
          return;
        }
        
        const task = await res.json();
        
        document.getElementById('editId').value = task.id;
        document.getElementById('editTitle').value = task.title;
        document.getElementById('editDescription').value = task.description || '';
        document.getElementById('editStatus').value = task.status;
        document.getElementById('editPriority').value = task.priority;
        document.getElementById('editCategory').value = task.category || '';
        document.getElementById('editDueDate').value = task.due_date ? task.due_date.split('T')[0] : '';
        document.getElementById('editOwnerId').value = task.owner_id || '';
        
        document.getElementById('editModal').style.display = 'block';
      } catch (err) {
        console.error('Failed to load task:', err);
        alert('Failed to load task');
      }
    }

    // Update task
    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (currentUser.role !== 'admin') {
        alert('Only admins can update tasks');
        return;
      }
      
      const id = document.getElementById('editId').value;
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      
      try {
        const res = await fetch(`/api/tasks/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (res.ok) {
          closeEditModal();
          await loadTasks();
          await loadStats();
        } else {
          const error = await res.json();
          alert(error.error || 'Failed to update task');
        }
      } catch (err) {
        console.error('Failed to update task:', err);
        alert('Failed to update task');
      }
    });

    // Delete task (admin only)
    async function deleteTask(id) {
      if (currentUser.role !== 'admin') {
        alert('Only admins can delete tasks');
        return;
      }
      
      if (!confirm('Are you sure you want to delete this task?')) return;
      
      try {
        const res = await fetch(`/api/tasks/${id}`, {
          method: 'DELETE'
        });
        
        if (res.ok) {
          await loadTasks();
          await loadStats();
        } else {
          const error = await res.json();
          alert(error.error || 'Failed to delete task');
        }
      } catch (err) {
        console.error('Failed to delete task:', err);
        alert('Failed to delete task');
      }
    }

    // Update task status (for users on their own tasks)
    async function updateTaskStatus(id, newStatus) {
      try {
        // Find the task in our local array
        const task = tasks.find(t => t.id === id);
        if (!task) {
          alert('Task not found');
          return;
        }
        
        // Verify user owns this task
        if (task.owner_id != currentUser.id) {
          alert('You can only update your own tasks');
          return;
        }
        
        // Update only the status field
        const updateData = {
          title: task.title,
          description: task.description,
          status: newStatus,
          priority: task.priority,
          category: task.category,
          due_date: task.due_date,
          owner_id: task.owner_id
        };
        
        const res = await fetch(`/api/tasks/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updateData)
        });
        
        if (res.ok) {
          await loadTasks();
          await loadStats();
        } else {
          const error = await res.json();
          alert(error.error || 'Failed to update task status');
        }
      } catch (err) {
        console.error('Failed to update task status:', err);
        alert('Failed to update task status');
      }
    }

    // Create user (admin only)
    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (currentUser.role !== 'admin') {
        alert('Only admins can create users');
        return;
      }
      
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      
      try {
        const res = await fetch('/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (res.ok) {
          hideCreateUserForm();
          await loadUsers();
          alert('User created successfully');
        } else {
          const error = await res.json();
          alert(error.error || 'Failed to create user');
        }
      } catch (err) {
        console.error('Failed to create user:', err);
        alert('Failed to create user');
      }
    });

    // Utility functions
    function formatStatus(status) {
      const statusMap = {
        todo: 'To Do',
        in_progress: 'In Progress',
        done: 'Done'
      };
      return statusMap[status] || status;
    }

    function formatPriority(priority) {
      const priorityMap = {
        low: 'Low',
        medium: 'Medium',
        high: 'High',
        critical: 'Critical'
      };
      return priorityMap[priority] || priority;
    }

    function formatDate(date) {
      return new Date(date).toLocaleDateString();
    }

    function formatDateTime(datetime) {
      return new Date(datetime).toLocaleString();
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function resetForm() {
      document.getElementById('taskForm').reset();
      document.getElementById('priority').value = 'medium';
    }

    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    function showCreateUserForm() {
      document.getElementById('createUserForm').style.display = 'block';
    }

    function hideCreateUserForm() {
      document.getElementById('createUserForm').style.display = 'none';
      document.getElementById('userForm').reset();
    }

    async function logout() {
      try {
        await fetch('/logout', { method: 'POST' });
        window.location.href = '/login.html';
      } catch (err) {
        console.error('Logout failed:', err);
      }
    }

    // Update time
    function updateTime() {
      document.getElementById('currentTime').textContent = new Date().toLocaleTimeString();
    }

    // Initialize
    checkAuth();
    updateTime();
    setInterval(updateTime, 1000);
    setInterval(loadTasks, 30000); // Refresh every 30 seconds
    setInterval(loadStats, 30000);
  </script>
</body>
</html>
