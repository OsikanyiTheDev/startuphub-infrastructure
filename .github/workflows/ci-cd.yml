name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'modules/**'
      - 'environments/dev/**'
      - 'app/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      apply_infrastructure:
        description: 'Apply Terraform changes?'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: dev
  ECR_REPOSITORY: startuphub-dev-app
  IMAGE_TAG: latest

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: environments/dev
        run: terraform validate

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ECR Repository URL
        id: ecr-repo
        run: |
          ECR_URL=$(aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --query 'repositories[0].repositoryUri' \
            --output text)
          echo "repository_url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Build Docker image
        working-directory: app
        run: |
          docker build -t ${{ steps.ecr-repo.outputs.repository_url }}:${{ env.IMAGE_TAG }} .

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.ecr-repo.outputs.repository_url }}:${{ env.IMAGE_TAG }}

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Generate terraform.tfvars
        working-directory: environments/dev
        run: |
          cat > terraform.tfvars <<EOF
          project_name = "${{ secrets.TF_VAR_project_name }}"
          region = "${{ secrets.TF_VAR_region }}"
          vpc_cidr = "${{ secrets.TF_VAR_vpc_cidr }}"
          
          public_subnet_1_cidr = "${{ secrets.TF_VAR_public_subnet_1_cidr }}"
          public_subnet_2_cidr = "${{ secrets.TF_VAR_public_subnet_2_cidr }}"
          
          private_subnet_1_cidr = "${{ secrets.TF_VAR_private_subnet_1_cidr }}"
          private_subnet_2_cidr = "${{ secrets.TF_VAR_private_subnet_2_cidr }}"
          
          private_db_subnet_1_cidr = "${{ secrets.TF_VAR_private_db_subnet_1_cidr }}"
          private_db_subnet_2_cidr = "${{ secrets.TF_VAR_private_db_subnet_2_cidr }}"
          
          alb_http_cidr = ${{ secrets.TF_VAR_alb_http_cidr }}
          alb_https_cidr = ${{ secrets.TF_VAR_alb_https_cidr }}
          
          ami_id = "${{ secrets.TF_VAR_ami_id }}"
          instance_type = "${{ secrets.TF_VAR_instance_type }}"
          
          desired_capacity = ${{ secrets.TF_VAR_desired_capacity }}
          min_size = ${{ secrets.TF_VAR_min_size }}
          max_size = ${{ secrets.TF_VAR_max_size }}
          
          enable_deletion_protection = ${{ secrets.TF_VAR_enable_deletion_protection }}
          force_delete = ${{ secrets.TF_VAR_force_delete }}
          
          db_engine = "${{ secrets.TF_VAR_db_engine }}"
          db_engine_version = "${{ secrets.TF_VAR_db_engine_version }}"
          db_instance_class = "${{ secrets.TF_VAR_db_instance_class }}"
          db_allocated_storage = ${{ secrets.TF_VAR_db_allocated_storage }}
          db_name = "${{ secrets.TF_VAR_db_name }}"
          db_username = "${{ secrets.TF_VAR_db_username }}"
          db_multi_az = ${{ secrets.TF_VAR_db_multi_az }}
          db_publicly_accessible = ${{ secrets.TF_VAR_db_publicly_accessible }}
          db_deletion_protection = ${{ secrets.TF_VAR_db_deletion_protection }}
          
          ecr_image_tag_mutability = "${{ secrets.TF_VAR_ecr_image_tag_mutability }}"
          ecr_scan_on_push = ${{ secrets.TF_VAR_ecr_scan_on_push }}
          ecr_image_tag = "${{ secrets.TF_VAR_ecr_image_tag }}"
          
          github_repository = "${{ secrets.TF_VAR_github_repository }}"
          EOF

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init

      - name: Terraform Plan
        working-directory: environments/dev
        run: terraform plan

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Generate terraform.tfvars
        working-directory: environments/dev
        run: |
          cat > terraform.tfvars <<EOF
          project_name = "${{ secrets.TF_VAR_project_name }}"
          region = "${{ secrets.TF_VAR_region }}"
          vpc_cidr = "${{ secrets.TF_VAR_vpc_cidr }}"
          
          public_subnet_1_cidr = "${{ secrets.TF_VAR_public_subnet_1_cidr }}"
          public_subnet_2_cidr = "${{ secrets.TF_VAR_public_subnet_2_cidr }}"
          
          private_subnet_1_cidr = "${{ secrets.TF_VAR_private_subnet_1_cidr }}"
          private_subnet_2_cidr = "${{ secrets.TF_VAR_private_subnet_2_cidr }}"
          
          private_db_subnet_1_cidr = "${{ secrets.TF_VAR_private_db_subnet_1_cidr }}"
          private_db_subnet_2_cidr = "${{ secrets.TF_VAR_private_db_subnet_2_cidr }}"
          
          alb_http_cidr = ${{ secrets.TF_VAR_alb_http_cidr }}
          alb_https_cidr = ${{ secrets.TF_VAR_alb_https_cidr }}
          
          ami_id = "${{ secrets.TF_VAR_ami_id }}"
          instance_type = "${{ secrets.TF_VAR_instance_type }}"
          
          desired_capacity = ${{ secrets.TF_VAR_desired_capacity }}
          min_size = ${{ secrets.TF_VAR_min_size }}
          max_size = ${{ secrets.TF_VAR_max_size }}
          
          enable_deletion_protection = ${{ secrets.TF_VAR_enable_deletion_protection }}
          force_delete = ${{ secrets.TF_VAR_force_delete }}
          
          db_engine = "${{ secrets.TF_VAR_db_engine }}"
          db_engine_version = "${{ secrets.TF_VAR_db_engine_version }}"
          db_instance_class = "${{ secrets.TF_VAR_db_instance_class }}"
          db_allocated_storage = ${{ secrets.TF_VAR_db_allocated_storage }}
          db_name = "${{ secrets.TF_VAR_db_name }}"
          db_username = "${{ secrets.TF_VAR_db_username }}"
          db_multi_az = ${{ secrets.TF_VAR_db_multi_az }}
          db_publicly_accessible = ${{ secrets.TF_VAR_db_publicly_accessible }}
          db_deletion_protection = ${{ secrets.TF_VAR_db_deletion_protection }}
          
          ecr_image_tag_mutability = "${{ secrets.TF_VAR_ecr_image_tag_mutability }}"
          ecr_scan_on_push = ${{ secrets.TF_VAR_ecr_scan_on_push }}
          ecr_image_tag = "${{ secrets.TF_VAR_ecr_image_tag }}"
          
          github_repository = "${{ secrets.TF_VAR_github_repository }}"
          EOF

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init

      - name: Terraform Apply
        working-directory: environments/dev
        run: terraform apply -auto-approve
