name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'modules/**'
      - 'environments/dev/**'
      - 'app/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      apply_infrastructure:
        description: 'Apply Terraform changes?'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: dev
  ECR_REPOSITORY: startuphub-dev-app
  IMAGE_TAG: latest

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: environments/dev
        run: terraform validate

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ECR Repository URL
        id: ecr-repo
        run: |
          ECR_URL=$(aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --query 'repositories[0].repositoryUri' \
            --output text)
          echo "repository_url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Build Docker image
        working-directory: app
        run: |
          docker build -t ${{ steps.ecr-repo.outputs.repository_url }}:${{ env.IMAGE_TAG }} .

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.ecr-repo.outputs.repository_url }}:${{ env.IMAGE_TAG }}

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Generate terraform.tfvars
        working-directory: environments/dev
        run: |
          cat > terraform.tfvars <<EOF
          project_name = "${{ secrets.TF_VAR_project_name }}"
          region = "${{ secrets.TF_VAR_region }}"
          vpc_cidr = "${{ secrets.TF_VAR_vpc_cidr }}"
          
          public_subnet_1_cidr = "${{ secrets.TF_VAR_public_subnet_1_cidr }}"
          public_subnet_2_cidr = "${{ secrets.TF_VAR_public_subnet_2_cidr }}"
          
          private_subnet_1_cidr = "${{ secrets.TF_VAR_private_subnet_1_cidr }}"
          private_subnet_2_cidr = "${{ secrets.TF_VAR_private_subnet_2_cidr }}"
          
          private_db_subnet_1_cidr = "${{ secrets.TF_VAR_private_db_subnet_1_cidr }}"
          private_db_subnet_2_cidr = "${{ secrets.TF_VAR_private_db_subnet_2_cidr }}"
          
          alb_http_cidr = ${{ secrets.TF_VAR_alb_http_cidr }}
          alb_https_cidr = ${{ secrets.TF_VAR_alb_https_cidr }}
          
          ami_id = "${{ secrets.TF_VAR_ami_id }}"
          instance_type = "${{ secrets.TF_VAR_instance_type }}"
          
          desired_capacity = ${{ secrets.TF_VAR_desired_capacity }}
          min_size = ${{ secrets.TF_VAR_min_size }}
          max_size = ${{ secrets.TF_VAR_max_size }}
          
          enable_deletion_protection = ${{ secrets.TF_VAR_enable_deletion_protection }}
          force_delete = ${{ secrets.TF_VAR_force_delete }}
          
          db_engine = "${{ secrets.TF_VAR_db_engine }}"
          db_engine_version = "${{ secrets.TF_VAR_db_engine_version }}"
          db_instance_class = "${{ secrets.TF_VAR_db_instance_class }}"
          db_allocated_storage = ${{ secrets.TF_VAR_db_allocated_storage }}
          db_name = "${{ secrets.TF_VAR_db_name }}"
          db_username = "${{ secrets.TF_VAR_db_username }}"
          db_multi_az = ${{ secrets.TF_VAR_db_multi_az }}
          db_publicly_accessible = ${{ secrets.TF_VAR_db_publicly_accessible }}
          db_deletion_protection = ${{ secrets.TF_VAR_db_deletion_protection }}
          
          ecr_image_tag_mutability = "${{ secrets.TF_VAR_ecr_image_tag_mutability }}"
          ecr_scan_on_push = ${{ secrets.TF_VAR_ecr_scan_on_push }}
          ecr_image_tag = "${{ secrets.TF_VAR_ecr_image_tag }}"
          
          github_repository = "${{ secrets.TF_VAR_github_repository }}"
          alert_email = "${{ secrets.TF_VAR_alert_email }}"
          waf_rate_limit = ${{ secrets.TF_VAR_waf_rate_limit }}
          EOF

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init

      - name: Terraform Plan
        working-directory: environments/dev
        run: terraform plan

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Generate terraform.tfvars
        working-directory: environments/dev
        run: |
          cat > terraform.tfvars <<EOF
          project_name = "${{ secrets.TF_VAR_project_name }}"
          region = "${{ secrets.TF_VAR_region }}"
          vpc_cidr = "${{ secrets.TF_VAR_vpc_cidr }}"
          
          public_subnet_1_cidr = "${{ secrets.TF_VAR_public_subnet_1_cidr }}"
          public_subnet_2_cidr = "${{ secrets.TF_VAR_public_subnet_2_cidr }}"
          
          private_subnet_1_cidr = "${{ secrets.TF_VAR_private_subnet_1_cidr }}"
          private_subnet_2_cidr = "${{ secrets.TF_VAR_private_subnet_2_cidr }}"
          
          private_db_subnet_1_cidr = "${{ secrets.TF_VAR_private_db_subnet_1_cidr }}"
          private_db_subnet_2_cidr = "${{ secrets.TF_VAR_private_db_subnet_2_cidr }}"
          
          alb_http_cidr = ${{ secrets.TF_VAR_alb_http_cidr }}
          alb_https_cidr = ${{ secrets.TF_VAR_alb_https_cidr }}
          
          ami_id = "${{ secrets.TF_VAR_ami_id }}"
          instance_type = "${{ secrets.TF_VAR_instance_type }}"
          
          desired_capacity = ${{ secrets.TF_VAR_desired_capacity }}
          min_size = ${{ secrets.TF_VAR_min_size }}
          max_size = ${{ secrets.TF_VAR_max_size }}
          
          enable_deletion_protection = ${{ secrets.TF_VAR_enable_deletion_protection }}
          force_delete = ${{ secrets.TF_VAR_force_delete }}
          
          db_engine = "${{ secrets.TF_VAR_db_engine }}"
          db_engine_version = "${{ secrets.TF_VAR_db_engine_version }}"
          db_instance_class = "${{ secrets.TF_VAR_db_instance_class }}"
          db_allocated_storage = ${{ secrets.TF_VAR_db_allocated_storage }}
          db_name = "${{ secrets.TF_VAR_db_name }}"
          db_username = "${{ secrets.TF_VAR_db_username }}"
          db_multi_az = ${{ secrets.TF_VAR_db_multi_az }}
          db_publicly_accessible = ${{ secrets.TF_VAR_db_publicly_accessible }}
          db_deletion_protection = ${{ secrets.TF_VAR_db_deletion_protection }}
          
          ecr_image_tag_mutability = "${{ secrets.TF_VAR_ecr_image_tag_mutability }}"
          ecr_scan_on_push = ${{ secrets.TF_VAR_ecr_scan_on_push }}
          ecr_image_tag = "${{ secrets.TF_VAR_ecr_image_tag }}"
          
          github_repository = "${{ secrets.TF_VAR_github_repository }}"
          alert_email = "${{ secrets.TF_VAR_alert_email }}"
          waf_rate_limit = ${{ secrets.TF_VAR_waf_rate_limit }}
          EOF

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init

      - name: Terraform Apply
        working-directory: environments/dev
        run: terraform apply -auto-approve

  deploy:
    name: Deploy New Image
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: |
      github.event_name == 'push' && 
      contains(toJson(github.event.head_commit.modified), 'app/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if app files changed
        id: check-changes
        run: |
          # Get list of changed files
          git fetch origin main --depth=1
          CHANGED_FILES=$(git diff --name-only origin/main HEAD)
          echo "Changed files: $CHANGED_FILES"
          
          # Check if any app files changed
          if echo "$CHANGED_FILES" | grep -q "^app/"; then
            echo "app_changed=true" >> $GITHUB_OUTPUT
            echo "✅ App files changed, will trigger deployment"
          else
            echo "app_changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No app files changed, skipping deployment"
          fi

      - name: Start instance refresh
        if: steps.check-changes.outputs.app_changed == 'true'
        run: |
          echo "🚀 Starting instance refresh for ASG: startuphub-dev-asg"
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name startuphub-dev-asg \
            --preferences '{"MinHealthyPercentage": 100, "InstanceWarmup": 300}'
          
          echo "✅ Instance refresh started successfully"
          echo "⏳ New instances will be launched with the latest Docker image"

      - name: Wait for instance refresh
        if: steps.check-changes.outputs.app_changed == 'true'
        run: |
          echo "⏳ Waiting for instance refresh to complete..."
          
          # Poll for refresh completion (max 15 minutes)
          MAX_ATTEMPTS=30
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name startuphub-dev-asg \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
            
            echo "Attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS: Status = $STATUS"
            
            if [ "$STATUS" = "Successful" ]; then
              echo "✅ Instance refresh completed successfully!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ Instance refresh failed or was cancelled"
              exit 1
            fi
            
            sleep 30
            ATTEMPT=$((ATTEMPT + 1))
          done
          
          echo "⚠️ Timeout waiting for instance refresh to complete"
          exit 1

      - name: Verify deployment
        if: steps.check-changes.outputs.app_changed == 'true'
        run: |
          echo "🔍 Verifying deployment..."
          
          # Get ALB DNS name
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names startuphub-dev-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          
          echo "🌐 Application URL: http://$ALB_DNS"
          
          # Wait for ALB to stabilize
          sleep 10
          
          # Test health endpoint
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://$ALB_DNS/health)
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health check passed! Application is live"
          else
            echo "⚠️ Health check returned HTTP $HTTP_CODE"
            echo "Application may still be starting up..."
          fi
